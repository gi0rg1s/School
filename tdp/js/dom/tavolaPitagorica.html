<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>crea tabella</title>
        <style>
            body {
                margin: 0;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 20px;
                font-family: Arial, Helvetica, sans-serif;
                text-align: center;
                background: #f6f6f6;
                color: #222;
            }

            h1 {
                margin: 0;
                font-size: 2rem;
                font-weight: 700;
            }

            #table-container {
                display: flex;
                justify-content: center;
            }

            table {
                margin: 0 auto;
            }

            th {
                width: 50px;
                height: 40px;
                border: 1px solid #444;
                text-align: center;
                vertical-align: middle;
                font-weight: 600;
            }

            .odd {
                background-color: #f3c6d1;
            }

            .even {
                background-color: #d8c7ef;
            }

            .empty {
                background-color: #ffffff;
                color: #ffffff;
            }

            #somma {
                min-width: 100px;
                padding: 10px 14px;
                border: 1px solid #ccc;
                border-radius: 8px;
                background: #fff;
                text-align: center;
                font-size: 1rem;
                font-weight: 600;
            }
        </style>
    </head>
    <body>
        <h1>Tavola pitagorica</h1>
        <div id="table-container"></div>

        <div id="somma"></div>
    </body>
    <script>
        const c = document.getElementById("table-container")
        const table = document.createElement("table")

        const para = document.createElement('p')
        para.textContent = '0'
        const sum = document.getElementById("somma").appendChild(para)

        for (let i  = 0; i  < 15; i++){
            let tr = document.createElement("tr")
            for(let j = 0; j < 15; j++){
                let th = document.createElement("th")
                th.textContent = `${(i + 1) * (j + 1)}`
                if((i + j) % 2 == 0){
                    th.className = 'even'
                }else {
                    th.className = 'odd'
                }
                th.addEventListener('click', ()=>{
                    sum.textContent = `${parseInt(sum.innerText) + parseInt(th.textContent)}`
                    th.textContent = '0'
                    th.className = 'empty'
                })
                tr.appendChild(th)
            }
            table.appendChild(tr)
        }
        
        c.appendChild(table)

    </script>
</html>
